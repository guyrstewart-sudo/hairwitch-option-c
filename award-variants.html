<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Hair Witch — Medal Variants</title>
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,700;1,6..96,600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; background: #000; }
  body { font-family: "Jost", sans-serif; color: #e7d9b8; }
  .wall { position: fixed; inset: 0; }
  .wall img { width: 100%; height: 100%; object-fit: cover; filter: blur(18px) brightness(.32); transform: scale(1.1); }
  .room { position: relative; min-height: 100vh; display: flex; flex-wrap: wrap;
    align-items: center; justify-content: center; gap: 6vw; padding: 8vh 4vw; }
  h1 { position: absolute; top: 4vh; left: 50%; transform: translateX(-50%); margin: 0;
    font-family: "Bodoni Moda", serif; font-weight: 700; font-style: italic; color: #e7cf9a;
    font-size: clamp(1.2rem, 3vw, 2rem); letter-spacing: .18em; white-space: nowrap; }
  .hang { width: clamp(240px, 34vw, 400px); text-align: center;
    transform-origin: 50% 0; animation: sway 7s ease-in-out infinite alternate; }
  .hang:nth-child(3) { animation-delay: -3.5s; }
  @keyframes sway { from { transform: rotate(1.2deg); } to { transform: rotate(-1.2deg); } }
  .thread { position: relative; height: 9vh; }
  .thread::before, .thread::after { content: ""; position: absolute; top: 0; bottom: 0; width: 1px;
    background: linear-gradient(to bottom, rgba(246,231,184,.12), #cfa85e); }
  .thread::before { left: calc(50% - 5px); transform: skewX(2.4deg); }
  .thread::after  { left: calc(50% + 5px); transform: skewX(-2.4deg); }
  .knot { position: relative; height: 12px; }
  .knot::before { content: ""; position: absolute; left: 50%; top: 0; transform: translateX(-50%);
    width: 11px; height: 11px; border: 1px solid #cfa85e; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #f6e7b8, #8a6a33); }
  svg { width: 100%; height: auto; display: block; overflow: visible;
    filter: drop-shadow(0 12px 26px rgba(0,0,0,.7)) drop-shadow(0 0 16px rgba(207,168,94,.22)); }
  .label { margin-top: 22px; }
  .label .n { font-family: "Bodoni Moda", serif; font-style: italic; font-size: 15px; letter-spacing: .3em; color: #f6e7b8; }
  .label .d { font-size: 10px; letter-spacing: .34em; color: #cfa85e; margin-top: 6px; text-transform: uppercase; }
  @media (prefers-reduced-motion: reduce) { .hang { animation: none; } }
</style>
</head>
<body>
<div class="wall"><img src="images/site123/s123-hero-main.png" alt="" aria-hidden="true"></div>
<div class="room">
  <h1>Choose Her Medal</h1>

  <!-- VARIANT I — Obsidian & Gold (current) -->
  <div class="hang">
    <div class="thread"></div><div class="knot"></div>
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Variant one: black medal with gold engraving">
      <defs>
        <linearGradient id="foil" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0" stop-color="#8a6a33"/><stop offset=".25" stop-color="#cfa85e"/>
          <stop offset=".5" stop-color="#f6e7b8"/><stop offset=".75" stop-color="#cfa85e"/>
          <stop offset="1" stop-color="#8a6a33"/>
          <animateTransform attributeName="gradientTransform" type="translate" values="-1 0; 1 0; -1 0" dur="8s" repeatCount="indefinite"/>
        </linearGradient>
        <radialGradient id="sheen" cx=".5" cy=".38" r=".75">
          <stop offset="0" stop-color="#141414"/><stop offset=".8" stop-color="#050505"/><stop offset="1" stop-color="#000"/>
        </radialGradient>
        <path id="arcT" d="M 22 100 A 78 78 0 0 1 178 100" fill="none"/>
        <path id="arcB" d="M 27 100 A 73 73 0 0 0 173 100" fill="none"/>
      </defs>
      <circle cx="100" cy="100" r="97" fill="url(#sheen)"/>
      <circle cx="100" cy="100" r="96" fill="none" stroke="url(#foil)" stroke-width="1.6"/>
      <circle cx="100" cy="100" r="90" fill="none" stroke="#cfa85e" stroke-width=".5" opacity=".55" stroke-dasharray="1.5 4"/>
      <circle cx="100" cy="100" r="64" fill="none" stroke="#cfa85e" stroke-width=".8" opacity=".8"/>
      <text fill="#e7cf9a" font-family="Jost, sans-serif" font-size="9" letter-spacing="2.6"><textPath href="#arcT" startOffset="50%" text-anchor="middle">TOP-RATED HAIR SALON</textPath></text>
      <text fill="#e7cf9a" font-family="Jost, sans-serif" font-size="8" letter-spacing="2.4"><textPath href="#arcB" startOffset="50%" text-anchor="middle">ASHEVILLE · NORTH CAROLINA</textPath></text>
      <g fill="none" stroke-linecap="round" opacity=".85">
        <path d="M 48 128 C 66 140, 88 146, 116 138 C 142 130, 152 112, 148 96" stroke="url(#foil)" stroke-width="1.6"/>
        <path d="M 52 134 C 72 146, 96 150, 122 141 C 144 133, 154 118, 151 104" stroke="#cfa85e" stroke-width="1" opacity=".6"/>
        <path d="M 46 122 C 62 133, 84 140, 110 134 C 134 128, 146 112, 144 98" stroke="#f6e7b8" stroke-width=".6" opacity=".5"/>
      </g>
      <text x="100" y="76" fill="#e7cf9a" font-family="Jost, sans-serif" font-size="9" letter-spacing="4.6" text-anchor="middle">RATED</text>
      <text x="100" y="118" fill="url(#foil)" font-family="'Bodoni Moda', serif" font-style="italic" font-weight="600" font-size="34" letter-spacing="2" text-anchor="middle">TOP 2</text>
      <g stroke="#f6e7b8" stroke-width="1.1" fill="none" transform="translate(52,120) rotate(24)">
        <circle cx="-5.5" cy="9" r="3"/><circle cx="5.5" cy="9" r="3"/>
        <path d="M -3.8 6.4 L 4.6 -11"/><path d="M 3.8 6.4 L -4.6 -11"/>
        <circle cx="0" cy="0" r="1" fill="#f6e7b8" stroke="none"/>
      </g>
      <g fill="#f6e7b8">
        <path d="M0 -3.2 L.9 -.9 L3.2 0 L.9 .9 L0 3.2 L-.9 .9 L-3.2 0 L-.9 -.9 Z" transform="translate(56,131)"/>
        <path d="M0 -3.6 L1 -1 L3.6 0 L1 1 L0 3.6 L-1 1 L-3.6 0 L-1 -1 Z" transform="translate(79,141)"/>
        <path d="M0 -4 L1.1 -1.1 L4 0 L1.1 1.1 L0 4 L-1.1 1.1 L-4 0 L-1.1 -1.1 Z" transform="translate(103,142)"/>
        <path d="M0 -3.6 L1 -1 L3.6 0 L1 1 L0 3.6 L-1 1 L-3.6 0 L-1 -1 Z" transform="translate(128,133)"/>
        <path d="M0 -3.2 L.9 -.9 L3.2 0 L.9 .9 L0 3.2 L-.9 .9 L-3.2 0 L-.9 -.9 Z" transform="translate(146,110)"/>
      </g>
    </svg>
    <div class="label"><div class="n">I</div><div class="d">Obsidian · Gold Leaf</div></div>
  </div>

  <!-- VARIANT II — Solid Gold, Onyx Engraving -->
  <div class="hang">
    <div class="thread"></div><div class="knot"></div>
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Variant two: solid gold medal with black engraving">
      <defs>
        <radialGradient id="goldDisc" cx=".38" cy=".3" r=".9">
          <stop offset="0" stop-color="#f9edc8"/><stop offset=".45" stop-color="#e3c27e"/>
          <stop offset=".8" stop-color="#b98c43"/><stop offset="1" stop-color="#8a6a33"/>
        </radialGradient>
        <linearGradient id="rim" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#f6e7b8"/><stop offset=".5" stop-color="#8a6a33"/><stop offset="1" stop-color="#f6e7b8"/>
        </linearGradient>
      </defs>
      <circle cx="100" cy="100" r="97" fill="url(#goldDisc)"/>
      <circle cx="100" cy="100" r="96" fill="none" stroke="url(#rim)" stroke-width="2"/>
      <circle cx="100" cy="100" r="90" fill="none" stroke="#1a1408" stroke-width=".5" opacity=".6" stroke-dasharray="1.5 4"/>
      <circle cx="100" cy="100" r="64" fill="none" stroke="#1a1408" stroke-width=".9" opacity=".85"/>
      <text fill="#231a09" font-family="Jost, sans-serif" font-size="9" letter-spacing="2.6" font-weight="500"><textPath href="#arcT" startOffset="50%" text-anchor="middle">TOP-RATED HAIR SALON</textPath></text>
      <text fill="#231a09" font-family="Jost, sans-serif" font-size="8" letter-spacing="2.4" font-weight="500"><textPath href="#arcB" startOffset="50%" text-anchor="middle">ASHEVILLE · NORTH CAROLINA</textPath></text>
      <g fill="none" stroke-linecap="round" opacity=".9">
        <path d="M 48 128 C 66 140, 88 146, 116 138 C 142 130, 152 112, 148 96" stroke="#2b2010" stroke-width="1.6"/>
        <path d="M 52 134 C 72 146, 96 150, 122 141 C 144 133, 154 118, 151 104" stroke="#3a2c12" stroke-width="1" opacity=".7"/>
        <path d="M 46 122 C 62 133, 84 140, 110 134 C 134 128, 146 112, 144 98" stroke="#1a1408" stroke-width=".6" opacity=".6"/>
      </g>
      <text x="100" y="76" fill="#231a09" font-family="Jost, sans-serif" font-size="9" letter-spacing="4.6" font-weight="500" text-anchor="middle">RATED</text>
      <text x="100" y="118" fill="#171006" font-family="'Bodoni Moda', serif" font-style="italic" font-weight="600" font-size="34" letter-spacing="2" text-anchor="middle">TOP 2</text>
      <g stroke="#2b2010" stroke-width="1.1" fill="none" transform="translate(52,120) rotate(24)">
        <circle cx="-5.5" cy="9" r="3"/><circle cx="5.5" cy="9" r="3"/>
        <path d="M -3.8 6.4 L 4.6 -11"/><path d="M 3.8 6.4 L -4.6 -11"/>
        <circle cx="0" cy="0" r="1" fill="#2b2010" stroke="none"/>
      </g>
      <g fill="#2b2010">
        <path d="M0 -3.2 L.9 -.9 L3.2 0 L.9 .9 L0 3.2 L-.9 .9 L-3.2 0 L-.9 -.9 Z" transform="translate(56,131)"/>
        <path d="M0 -3.6 L1 -1 L3.6 0 L1 1 L0 3.6 L-1 1 L-3.6 0 L-1 -1 Z" transform="translate(79,141)"/>
        <path d="M0 -4 L1.1 -1.1 L4 0 L1.1 1.1 L0 4 L-1.1 1.1 L-4 0 L-1.1 -1.1 Z" transform="translate(103,142)"/>
        <path d="M0 -3.6 L1 -1 L3.6 0 L1 1 L0 3.6 L-1 1 L-3.6 0 L-1 -1 Z" transform="translate(128,133)"/>
        <path d="M0 -3.2 L.9 -.9 L3.2 0 L.9 .9 L0 3.2 L-.9 .9 L-3.2 0 L-.9 -.9 Z" transform="translate(146,110)"/>
      </g>
    </svg>
    <div class="label"><div class="n">II</div><div class="d">Solid Gold · Onyx Engraving</div></div>
  </div>
</div>
</body>
</html>
